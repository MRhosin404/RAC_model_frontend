<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" fill="none" stroke="#b0bec5" stroke-width="1.2" opacity="0.45">
  <!-- Ground plane -->
  <line x1="0" y1="650" x2="1400" y2="650"/>
  <line x1="200" y1="680" x2="1400" y2="680"/>

  <!-- LEFT BUILDING - lower section -->
  <rect x="60" y="340" width="320" height="310"/>
  <!-- Left building windows row 1 -->
  <rect x="80" y="360" width="55" height="70"/><rect x="150" y="360" width="55" height="70"/>
  <rect x="220" y="360" width="55" height="70"/><rect x="290" y="360" width="75" height="70"/>
  <!-- Left building windows row 2 -->
  <rect x="80" y="450" width="55" height="70"/><rect x="150" y="450" width="55" height="70"/>
  <rect x="220" y="450" width="55" height="70"/>
  <!-- Large glass door left -->
  <rect x="80" y="540" width="120" height="110"/>
  <line x1="140" y1="540" x2="140" y2="650"/>
  <!-- Vertical column lines left building -->
  <line x1="145" y1="340" x2="145" y2="650"/>
  <line x1="215" y1="340" x2="215" y2="650"/>
  <line x1="285" y1="340" x2="285" y2="650"/>

  <!-- LEFT BUILDING - upper section / overhang -->
  <rect x="30" y="180" width="380" height="160"/>
  <line x1="30" y1="200" x2="410" y2="200"/>
  <!-- Upper windows -->
  <rect x="50" y="210" width="70" height="80"/><rect x="140" y="210" width="70" height="80"/>
  <rect x="230" y="210" width="70" height="80"/><rect x="320" y="210" width="70" height="80"/>
  <!-- Roof detail -->
  <line x1="30" y1="180" x2="0" y2="160"/>
  <line x1="410" y1="180" x2="440" y2="160"/>
  <line x1="0" y1="160" x2="440" y2="160"/>

  <!-- CONNECTING BRIDGE/WALKWAY -->
  <rect x="380" y="400" width="120" height="250"/>
  <line x1="380" y1="430" x2="500" y2="430"/>
  <line x1="380" y1="470" x2="500" y2="470"/>
  <!-- Overhang bridge -->
  <rect x="360" y="340" width="160" height="60"/>

  <!-- RIGHT BUILDING - main block (larger) -->
  <rect x="490" y="180" width="580" height="470"/>

  <!-- Right building facade dividers -->
  <line x1="490" y1="210" x2="1070" y2="210"/>
  <line x1="490" y1="390" x2="1070" y2="390"/>

  <!-- Upper floor windows - large panoramic -->
  <rect x="510" y="220" width="130" height="160"/>
  <line x1="575" y1="220" x2="575" y2="380"/>
  <rect x="660" y="220" width="130" height="160"/>
  <line x1="725" y1="220" x2="725" y2="380"/>
  <rect x="810" y="220" width="120" height="160"/>
  <rect x="950" y="220" width="100" height="160"/>
  <line x1="1000" y1="220" x2="1000" y2="380"/>

  <!-- Right building - lower section large glass -->
  <rect x="510" y="400" width="260" height="250"/>
  <line x1="640" y1="400" x2="640" y2="650"/>
  <line x1="510" y1="480" x2="770" y2="480"/>
  <line x1="510" y1="560" x2="770" y2="560"/>
  <!-- Sub-panes lower left -->
  <line x1="575" y1="480" x2="575" y2="650"/>

  <!-- Staircase visible through glass (right center) -->
  <rect x="790" y="400" width="100" height="250"/>
  <line x1="790" y1="430" x2="890" y2="430"/>
  <line x1="800" y1="460" x2="880" y2="460"/>
  <line x1="800" y1="490" x2="880" y2="490"/>
  <line x1="800" y1="520" x2="880" y2="520"/>
  <line x1="800" y1="550" x2="880" y2="550"/>
  <line x1="800" y1="580" x2="880" y2="580"/>
  <line x1="800" y1="610" x2="880" y2="610"/>
  <!-- Stair diagonal -->
  <line x1="800" y1="650" x2="880" y2="400"/>

  <!-- Large glass wall right side -->
  <rect x="910" y="400" width="140" height="250"/>
  <line x1="980" y1="400" x2="980" y2="650"/>
  <line x1="910" y1="480" x2="1050" y2="480"/>
  <line x1="910" y1="560" x2="1050" y2="560"/>
  <!-- Interior shelf/furniture hint -->
  <rect x="930" y="560" width="100" height="30"/>

  <!-- Right column block -->
  <rect x="1070" y="280" width="200" height="370"/>
  <line x1="1070" y1="310" x2="1270" y2="310"/>
  <rect x="1090" y="320" width="60" height="80"/><rect x="1170" y="320" width="60" height="80"/>
  <rect x="1090" y="420" width="60" height="80"/><rect x="1170" y="420" width="60" height="80"/>
  <!-- Horizontal louvers/slats right column -->
  <line x1="1090" y1="520" x2="1250" y2="520"/>
  <line x1="1090" y1="535" x2="1250" y2="535"/>
  <line x1="1090" y1="550" x2="1250" y2="550"/>
  <line x1="1090" y1="565" x2="1250" y2="565"/>
  <line x1="1090" y1="580" x2="1250" y2="580"/>
  <line x1="1090" y1="595" x2="1250" y2="595"/>
  <line x1="1090" y1="610" x2="1250" y2="610"/>
  <!-- Vertical dividers right col -->
  <line x1="1150" y1="280" x2="1150" y2="650"/>
  <line x1="1220" y1="280" x2="1220" y2="650"/>

  <!-- Far right extension -->
  <rect x="1260" y="380" width="130" height="270"/>
  <line x1="1260" y1="410" x2="1390" y2="410"/>
  <rect x="1275" y="420" width="90" height="60"/>
  <rect x="1275" y="500" width="90" height="60"/>

  <!-- Roof top lines right building -->
  <line x1="490" y1="180" x2="490" y2="160"/>
  <line x1="1070" y1="180" x2="1070" y2="150"/>
  <line x1="490" y1="160" x2="1100" y2="150"/>

  <!-- Perspective depth lines to vanishing point -->
  <line x1="490" y1="650" x2="200" y2="720" stroke-dasharray="6 4"/>
  <line x1="1070" y1="650" x2="1400" y2="700" stroke-dasharray="6 4"/>

  <!-- Foreground courtyard floor grid -->
  <line x1="200" y1="700" x2="1400" y2="700"/>
  <line x1="300" y1="680" x2="1400" y2="680"/>
  <!-- Floor grid perspective lines -->
  <line x1="350" y1="650" x2="300" y2="750" stroke-dasharray="4 4"/>
  <line x1="550" y1="650" x2="500" y2="750" stroke-dasharray="4 4"/>
  <line x1="750" y1="650" x2="700" y2="750" stroke-dasharray="4 4"/>
  <line x1="950" y1="650" x2="900" y2="750" stroke-dasharray="4 4"/>
</svg>
